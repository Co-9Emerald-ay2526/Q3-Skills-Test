<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Sophia Tickets</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    <div class="container mt-4 rounded p-0">
        
        <div class="bg-info p-3 text-center">
            <h1 class="m-0">Cine Sophia Ticket Booth</h1>
        </div>

        <div class="p-4">
            <h3>Student Details</h3>
            <label>Full Name</label>
            <input type="text" id="name" class="form-control"> <hr>

            <h2>Ticket Selection</h2> <hr>
            
            <h3>Quantity</h3>
            <label>250₱ each</label>
            <input type="number" id="qty" class="form-control"> <hr>

            <h3>Payment Details</h3>
            <label>Subtotal</label>
            <input type="number" id="subtotal" class="form-control" readonly> <br>
            
            <h6>Admin Fee: ₱50</h6>
            
            <label>Total</label>
            <input type="number" id="total" class="form-control" readonly> <hr>

            <div class="text-center">
 <button class="btn btn-info" onclick="calculate()">Complete Registration</button>
                <button class="btn btn-info" onclick="window.location.reload()">Refresh</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
